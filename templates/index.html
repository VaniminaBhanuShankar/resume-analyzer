<!DOCTYPE html>
<html>
<head>
    <title>Smart Resume Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #5a67d8;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #f1f1f1;
            margin: 5px;
            padding: 8px;
            border-radius: 5px;
        }

        .skills {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📄 Smart Resume Analyzer</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" required><br>
            <button type="submit">Analyze Resume</button>
        </form>

        {% if skills %}
        <div class="skills">
            <h3>✅ Detected Skills:</h3>
            <ul>
                {% for skill in skills %}
                <li>{{ skill }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>

</body>
</html>
